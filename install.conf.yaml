- clean: [ "~" ]

- clean:
    ~/.config:
      recursive: true
      force: true
    ~/etc:
      recursive: true
      force: true
    ~/.local/share/icons:
      recursive: true
      force: true

- create:
  - ~/projects
  - ~/scripts

- shell:
  - command: chmod +x ./scripts/install_dependencies.sh ./scripts/install_nerd_fonts.sh ./scripts/install_asus_specific_dependencies.sh
    description: Give install script executable permissions
  - command: ./scripts/install_nerd_fonts.sh
    description: Run install script for install_nerd_fonts
    stdout: true
  - command: ./scripts/install_dependencies.sh
    description: Run install script for install_dependencies
    stdout: true
  - command: ./scripts/install_asus_specific_dependencies.sh
    description: Run install script for ASUS laptops only
    stdout: true

# General files
- defaults:
    link:
      create: true
      relink: true
      force: true

- link:
    ~/scripts:
    ~/.config:
      glob: true
      path: config/**
    ~/.aws:
      glob: true
      path: aws/*
    ~/:
      glob: true
      path: git/*
      prefix: "."
    ~/:
      glob: true
      path: home/*
      prefix: "."


# Fedora KDE specific files
- defaults:
    link:
      create: true
      relink: true
      force: true

- link:
    ~/.config:
      glob: true
      path: kde/config/**
    /etc:
      glob: true
      path: kde/etc/**

- defaults:
    link:
      create: true
      relink: false
      force: false

- link:
    ~/.local/share:
      glob: true
      path: kde/local/**
    ~/.local/share/icons:
      glob: true
      path: kde/icons/**
